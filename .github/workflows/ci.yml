name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '13'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Pin Testbench for Laravel ${{ matrix.laravel }}
        run: composer require --dev --no-interaction --no-update "orchestra/testbench:${{ matrix.testbench }}"

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --with-all-dependencies

      - name: Pint check
        run: vendor/bin/pint --test

      - name: Test suite
        run: composer test
